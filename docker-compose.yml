services:
  postgres:
    image: postgres:16-alpine
    container_name: arago-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: arago
      POSTGRES_PASSWORD: arago
      POSTGRES_DB: arago
    ports:
      - "5432:5432"
    volumes:
      - arago-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arago -d arago"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  arago-pgdata:
